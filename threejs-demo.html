<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Demo - Zebin Li</title>
    <link rel="stylesheet" href="style.css">
    <link rel="canonical" href="https://cutelizebin.github.io/threejs-demo.html">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }
        .back {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 100;
        }
        .back a {
            color: #fff;
            text-decoration: none;
            opacity: 0.7;
            font-size: 14px;
        }
        .back a:hover { opacity: 1; }
        .info {
            position: fixed;
            bottom: 24px;
            left: 24px;
            opacity: 0.6;
            font-size: 13px;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div class="back">
        <a href="index-en.html">← Back to Home</a>
    </div>
    <div class="info">Drag to rotate · Scroll to zoom</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Create a KVCache-inspired structure
        const group = new THREE.Group();

        // GPU box (main body)
        const gpuGeometry = new THREE.BoxGeometry(2, 1.5, 0.3);
        const gpuMaterial = new THREE.MeshPhongMaterial({
            color: 0x2563eb,
            shininess: 100,
            transparent: true,
            opacity: 0.9
        });
        const gpu = new THREE.Mesh(gpuGeometry, gpuMaterial);
        group.add(gpu);

        // Memory layers (KVCache blocks)
        const layerColors = [0x10b981, 0x8b5cf6, 0xf59e0b, 0xef4444];
        for (let i = 0; i < 4; i++) {
            const layerGeo = new THREE.BoxGeometry(1.8, 0.15, 0.25);
            const layerMat = new THREE.MeshPhongMaterial({
                color: layerColors[i],
                shininess: 80
            });
            const layer = new THREE.Mesh(layerGeo, layerMat);
            layer.position.y = -0.4 + i * 0.25;
            layer.position.z = 0.1;
            group.add(layer);
        }

        // Connection lines (data flow)
        for (let i = 0; i < 8; i++) {
            const lineGeo = new THREE.CylinderGeometry(0.02, 0.02, 1.5);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.position.x = -0.7 + i * 0.2;
            line.position.z = 0.3;
            group.add(line);
        }

        scene.add(group);

        // Floating particles (token representation)
        const particleCount = 200;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 8;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 8;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 8 - 2;
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0x2563eb,
            size: 0.05,
            transparent: true,
            opacity: 0.8
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0x2563eb, 1);
        pointLight1.position.set(5, 5, 5);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0x10b981, 0.8);
        pointLight2.position.set(-5, -5, 5);
        scene.add(pointLight2);

        // Camera position
        camera.position.set(0, 0, 4);

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation
        function animate() {
            requestAnimationFrame(animate);

            // Rotate group
            group.rotation.y += 0.003;
            group.rotation.x = Math.sin(Date.now() * 0.001) * 0.1;

            // Animate particles
            particles.rotation.y += 0.001;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
