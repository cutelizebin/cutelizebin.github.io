<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Inference Pipeline - Zebin Li</title>
    <link rel="canonical" href="https://cutelizebin.github.io/llm-pipeline.html">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }
        .back {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 100;
        }
        .back a {
            color: #fff;
            text-decoration: none;
            opacity: 0.7;
            font-size: 14px;
        }
        .title {
            position: fixed;
            top: 24px;
            right: 24px;
            text-align: right;
            z-index: 100;
        }
        .title h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .title p { font-size: 12px; opacity: 0.6; }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div class="back">
        <a href="index-en.html">← Back to Home</a>
    </div>
    <div class="title">
        <h1>LLM Inference Pipeline</h1>
        <p>API → Tokenize → Schedule → GPU</p>
    </div>
    <div id="canvas-container"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Positions
        const P = {
            entry: new THREE.Vector3(-5, 0, 0),
            tokenizer: new THREE.Vector3(-1.5, 0, 0),
            scheduler: new THREE.Vector3(2.5, 0, 0),
            gpu: new THREE.Vector3(6, 0, 0)
        };

        // 1. API Entry (red ring)
        const entryGroup = new THREE.Group();
        const torus = new THREE.Mesh(
            new THREE.TorusGeometry(1, 0.08, 16, 32),
            new THREE.MeshStandardMaterial({ color: 0xef4444, emissive: 0xef4444, emissiveIntensity: 0.3 })
        );
        entryGroup.add(torus);
        entryGroup.position.copy(P.entry);
        scene.add(entryGroup);

        addLabel('API Entry', P.entry.clone().add(new THREE.Vector3(0, -1.8, 0)), '#ef4444');

        // 2. Tokenizer (yellow box)
        const tokenGroup = new THREE.Group();
        const tbox = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 1.2, 1.2),
            new THREE.MeshStandardMaterial({ color: 0xf59e0b, metalness: 0.5, roughness: 0.3 })
        );
        tokenGroup.add(tbox);
        tokenGroup.position.copy(P.tokenizer);
        scene.add(tokenGroup);

        addLabel('Tokenizer', P.tokenizer.clone().add(new THREE.Vector3(0, -1.8, 0)), '#f59e0b');

        // 3. Scheduler (purple queue)
        const schedGroup = new THREE.Group();
        const sq = new THREE.Mesh(
            new THREE.CylinderGeometry(0.8, 0.8, 0.2, 32),
            new THREE.MeshStandardMaterial({ color: 0x8b5cf6, metalness: 0.5, roughness: 0.3 })
        );
        // Queue items
        for (let i = 0; i < 3; i++) {
            const qitem = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.25, 0.25),
                new THREE.MeshStandardMaterial({ color: 0xa78bfa })
            );
            qitem.position.y = 0.4 + i * 0.35;
            schedGroup.add(qitem);
        }
        schedGroup.add(sq);
        schedGroup.position.copy(P.scheduler);
        scene.add(schedGroup);

        addLabel('Scheduler', P.scheduler.clone().add(new THREE.Vector3(0, -1.8, 0)), '#8b5cf6');

        // 4. GPU (blue with KVCache)
        const gpuGroup = new THREE.Group();
        const gpubody = new THREE.Mesh(
            new THREE.BoxGeometry(2, 0.25, 1.5),
            new THREE.MeshStandardMaterial({ color: 0x2563eb, metalness: 0.7, roughness: 0.2 })
        );
        gpuGroup.add(gpubody);

        // KVCache blocks
        for (let i = 0; i < 4; i++) {
            const kv = new THREE.Mesh(
                new THREE.BoxGeometry(0.35, 0.15, 0.25),
                new THREE.MeshStandardMaterial({ color: 0x10b981, emissive: 0x10b981, emissiveIntensity: 0.2 })
            );
            kv.position.set(-0.7 + i * 0.4, 0.2, 0.4);
            gpuGroup.add(kv);
            const kv2 = kv.clone();
            kv2.position.z = -0.4;
            gpuGroup.add(kv2);
        }
        // Cooling vents
        for (let i = 0; i < 4; i++) {
            const vent = new THREE.Mesh(
                new THREE.CylinderGeometry(0.015, 0.015, 1.2),
                new THREE.MeshBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: 0.5 })
            );
            vent.position.set(-0.75 + i * 0.45, 0, 0);
            vent.rotation.z = Math.PI / 2;
            gpuGroup.add(vent);
        }
        gpuGroup.position.copy(P.gpu);
        scene.add(gpuGroup);

        addLabel('GPU + KVCache', P.gpu.clone().add(new THREE.Vector3(0, -1.8, 0)), '#2563eb');

        // Flow particles
        const paths = [
            { from: P.entry, to: P.tokenizer, color: 0xef4444 },
            { from: P.tokenizer, to: P.scheduler, color: 0xf59e0b },
            { from: P.scheduler, to: P.gpu, color: 0x2563eb }
        ];

        paths.forEach(p => {
            // Line
            const lineMat = new THREE.LineBasicMaterial({ color: p.color, transparent: true, opacity: 0.3 });
            const lineGeo = new THREE.BufferGeometry().setFromPoints([p.from, p.to]);
            scene.add(new THREE.Line(lineGeo, lineMat));

            // Particles
            const pcount = 30;
            const positions = new Float32Array(pcount * 3);
            for (let i = 0; i < pcount; i++) {
                const t = i / pcount;
                positions[i * 3] = THREE.MathUtils.lerp(p.from.x, p.to.x, t);
                positions[i * 3 + 1] = THREE.MathUtils.lerp(p.from.y, p.to.y, t);
                positions[i * 3 + 2] = THREE.MathUtils.lerp(p.from.z, p.to.z, t);
            }
            const pgeo = new THREE.BufferGeometry();
            pgeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const pmat = new THREE.PointsMaterial({ color: p.color, size: 0.08, transparent: true, opacity: 0.8 });
            const pts = new THREE.Points(pgeo, pmat);
            scene.add(pts);
        });

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const l1 = new THREE.PointLight(0xffffff, 1);
        l1.position.set(0, 5, 5);
        scene.add(l1);

        camera.position.set(0, 2, 12);
        camera.lookAt(0, 0, 0);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;

            entryGroup.rotation.z = Math.sin(time) * 0.15;
            tokenGroup.rotation.y += 0.02;
            schedGroup.rotation.y += 0.01;

            // GPU spin ring effect
            gpuGroup.rotation.y = Math.sin(time * 2) * 0.05;

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        function addLabel(text, pos, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(text, 128, 40);

            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: tex });
            const sprite = new THREE.Sprite(mat);
            sprite.position.copy(pos);
            sprite.scale.set(2.5, 0.625, 1);
            scene.add(sprite);
        }
    </script>
</body>
</html>
